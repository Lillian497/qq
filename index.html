<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>謝謝老師</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg,#fff0f5,#f0f8ff);
  overflow: hidden;
  font-family: "Microsoft JhengHei";
}

/* 🌸 櫻花 */
.sakura {
  position: fixed;
  top: -10px;
  width: 15px;
  height: 15px;
  background: pink;
  border-radius: 50%;
  opacity: 0.7;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}

/* ✨ 粒子 */
.particle {
  position: fixed;
  width: 5px;
  height: 5px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 10px white;
  animation: float 5s infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity:0;}
  50% {opacity:1;}
  100% { transform: translateY(-100px); opacity:0;}
}

/* 🎤 主文字 */
.container {
  position: relative;
  z-index: 10;
  text-align: center;
  top: 20vh;
  color: #6b4c5a;
}

h1 {
  font-size: 3em;
  text-shadow: 0 0 20px rgba(255,150,200,0.6);
}

/* 打字機 */
.typing {
  font-size: 1.3em;
  margin-top: 20px;
  border-right: 2px solid;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  animation: typing 5s steps(40) forwards, blink .7s infinite;
}

@keyframes typing {
  to { width: 80%; }
}

@keyframes blink {
  50% { border-color: transparent; }
}

/* 🌱 樹 */
.tree {
  margin-top: 80px;
}

.stem {
  width: 10px;
  height: 0;
  background: green;
  margin: auto;
  animation: grow 3s forwards;
}

@keyframes grow {
  to { height: 100px; }
}

.leaf {
  width: 30px;
  height: 20px;
  background: lightgreen;
  border-radius: 50%;
  margin: auto;
  opacity: 0;
  animation: leafGrow 2s forwards;
  animation-delay: 3s;
}

@keyframes leafGrow {
  to { opacity: 1; transform: scale(1.5); }
}

/* 💫 滑鼠光點 */
.cursor {
  position: fixed;
  width: 10px;
  height: 10px;
  background: pink;
  border-radius: 50%;
  pointer-events: none;
  box-shadow: 0 0 20px pink;
}

</style>
</head>

<body>

<div class="container">
  <h1>謝謝老師 ❤️</h1>

  <div class="typing">
    老師，謝謝您陪伴我們走過這段青春，
    您的教導會一直留在我們心裡。
  </div>

  <div class="tree">
    <div class="stem"></div>
    <div class="leaf"></div>
  </div>
</div>

<div class="cursor" id="cursor"></div>

<script>
/* 🌸 櫻花生成 */
for(let i=0;i<30;i++){
  let sakura=document.createElement("div");
  sakura.className="sakura";
  sakura.style.left=Math.random()*100+"vw";
  sakura.style.animationDuration=5+Math.random()*5+"s";
  document.body.appendChild(sakura);
}

/* ✨ 粒子 */
setInterval(()=>{
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.top=Math.random()*100+"vh";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),5000);
},200);

/* 💫 滑鼠光點 */
document.addEventListener("mousemove",(e)=>{
  const c=document.getElementById("cursor");
  c.style.left=e.clientX+"px";
  c.style.top=e.clientY+"px";
});
</script>

</body>
</html>
