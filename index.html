<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>致，我們的導師：時光實驗室</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: white; font-family: 'Helvetica Neue', sans-serif; }
        
        section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; border-bottom: 1px solid #222; }
        
        .title-wrapper { position: relative; text-align: center; }
        h1 { font-size: 8vw; font-weight: 800; letter-spacing: -2px; }
        p { font-size: 1.5rem; color: #888; margin-top: 20px; }

        /* 特效：膠卷掃描線 */
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%), linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06)); z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <section class="stage" id="s1">
        <div class="title-wrapper">
            <h1 class="split-text">時光實驗</h1>
            <p>紀錄我們與您的三年化學反應</p>
        </div>
    </section>

    <section class="stage" id="s2">
        <h2 style="font-size: 5rem;">理論的啟蒙</h2>
        <p>從第一個公式開始，我們學會了觀察世界</p>
    </section>

    <section class="stage" id="s3">
        <h2 style="font-size: 5rem;">實驗的碰撞</h2>
        <p>在火花與煙霧中，找到了成長的方向</p>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 鎖定每一幕的滾動特效
        document.querySelectorAll('.stage').forEach((stage, i) => {
            ScrollTrigger.create({
                trigger: stage,
                start: "top top",
                pin: true,
                pinSpacing: false
            });

            // 進入畫面時的動畫
            gsap.fromTo(stage.querySelector('h2, .split-text'), 
                { y: 100, opacity: 0 }, 
                { y: 0, opacity: 1, duration: 1.5, scrollTrigger: { trigger: stage, start: "top 80%" } }
            );
        });

        // 滑鼠互動背景色隨機變換
        window.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            gsap.to("body", { backgroundColor: `rgb(${x * 50}, ${x * 30}, ${x * 80})`, duration: 2 });
        });
    </script>
</body>
</html>
