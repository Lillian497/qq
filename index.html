<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>謝謝老師</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f1118;
    }

    body {
      position: relative;
      color: white;
    }

    /* 背景天空 */
    .sky {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 220, 235, 0.22), transparent 22%),
        radial-gradient(circle at 80% 18%, rgba(193, 223, 255, 0.22), transparent 24%),
        radial-gradient(circle at 50% 60%, rgba(255, 238, 185, 0.10), transparent 26%),
        linear-gradient(to bottom, #111420 0%, #1a2335 40%, #2a3a56 70%, #f9e8df 100%);
      animation: skyShift 16s ease-in-out infinite alternate;
    }

    @keyframes skyShift {
      0% {
        filter: brightness(0.95) saturate(1);
      }
      100% {
        filter: brightness(1.08) saturate(1.08);
      }
    }

    /* 星光 */
    .stars, .petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 0 10px rgba(255,255,255,0.8);
      animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.7); }
      50% { opacity: 1; transform: scale(1.8); }
    }

    /* 花瓣 */
    .petal {
      position: absolute;
      top: -40px;
      width: 16px;
      height: 12px;
      background: radial-gradient(circle at 30% 30%, #fff, #ffb2cf 72%);
      border-radius: 60% 40% 60% 40%;
      opacity: 0.85;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(-40px) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% { opacity: 0.85; }
      100% {
        transform: translateY(110vh) translateX(60px) rotate(360deg);
        opacity: 0;
      }
    }

    /* 主場景 */
    .scene {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 2;
      pointer-events: none;
    }

    .ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 28vh;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.12), transparent 30%),
        linear-gradient(to top, #5f7050 0%, #6e825d 25%, #9caf8d 60%, rgba(255,255,255,0) 100%);
      clip-path: ellipse(90% 100% at 50% 100%);
      opacity: 0.95;
    }

    /* 中央樹 */
    .tree-stage {
      position: absolute;
      bottom: 10vh;
      width: min(80vw, 700px);
      height: min(78vh, 760px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 10px 30px rgba(0,0,0,0.18));
    }

    /* 樹的動畫 */
    .trunk-path {
      fill: none;
      stroke: #6f513f;
      stroke-width: 16;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
      animation: drawTree 4s ease forwards;
      animation-delay: 1.5s;
    }

    .branch-path {
      fill: none;
      stroke: #765743;
      stroke-width: 9;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: drawBranch 2.2s ease forwards;
    }

    .b1 { animation-delay: 4.8s; }
    .b2 { animation-delay: 5.2s; }
    .b3 { animation-delay: 5.6s; }
    .b4 { animation-delay: 6s; }

    @keyframes drawTree {
      to { stroke-dashoffset: 0; }
    }

    @keyframes drawBranch {
      to { stroke-dashoffset: 0; }
    }

    .leaf {
      transform-box: fill-box;
      transform-origin: center;
      opacity: 0;
      transform: scale(0);
      animation: leafGrow 1.2s ease forwards;
    }

    .l1 { animation-delay: 6.1s; }
    .l2 { animation-delay: 6.4s; }
    .l3 { animation-delay: 6.7s; }
    .l4 { animation-delay: 7s; }
    .l5 { animation-delay: 7.2s; }
    .l6 { animation-delay: 7.4s; }
    .l7 { animation-delay: 7.6s; }
    .l8 { animation-delay: 7.8s; }

    @keyframes leafGrow {
      0% {
        opacity: 0;
        transform: scale(0);
      }
      70% {
        opacity: 1;
        transform: scale(1.18);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .flower {
      transform-box: fill-box;
      transform-origin: center;
      opacity: 0;
      transform: scale(0);
      animation: bloom 1.3s ease forwards;
    }

    .f1 { animation-delay: 8.1s; }
    .f2 { animation-delay: 8.4s; }
    .f3 { animation-delay: 8.7s; }
    .f4 { animation-delay: 9.0s; }
    .f5 { animation-delay: 9.3s; }

    @keyframes bloom {
      0% {
        opacity: 0;
        transform: scale(0);
      }
      75% {
        opacity: 1;
        transform: scale(1.25);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .glow {
      opacity: 0;
      animation: glowRise 2.5s ease forwards;
      animation-delay: 7.8s;
    }

    @keyframes glowRise {
      0% {
        opacity: 0;
        transform: scale(0.8);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* 字幕 */
    .captions {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    .caption {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(88vw, 900px);
      text-align: center;
      color: white;
      text-shadow: 0 4px 18px rgba(0,0,0,0.35);
      opacity: 0;
      filter: blur(8px);
    }

    .top-caption {
      top: 12vh;
      font-size: clamp(1.2rem, 2.8vw, 2rem);
      letter-spacing: 2px;
      animation: subtitleIn 2s ease forwards;
    }

    .line1 { animation-delay: 0.5s; }
    .line2 { animation-delay: 3.2s; }
    .line3 { animation-delay: 6.2s; }

    .bottom-caption {
      bottom: 7vh;
      font-size: clamp(1rem, 2.2vw, 1.35rem);
      line-height: 1.9;
      color: rgba(255,255,255,0.96);
      animation: subtitleIn 2s ease forwards;
    }

    .line4 { animation-delay: 9.2s; }
    .line5 { animation-delay: 13s; }

    @keyframes subtitleIn {
      0% {
        opacity: 0;
        filter: blur(8px);
        transform: translateX(-50%) translateY(14px);
      }
      18% {
        opacity: 1;
        filter: blur(0);
        transform: translateX(-50%) translateY(0);
      }
      82% {
        opacity: 1;
        filter: blur(0);
        transform: translateX(-50%) translateY(0);
      }
      100% {
        opacity: 0;
        filter: blur(8px);
        transform: translateX(-50%) translateY(-10px);
      }
    }

    /* 最後大字 */
    .final-message {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 8;
      opacity: 0;
      pointer-events: none;
      animation: finalShow 3.5s ease forwards;
      animation-delay: 17s;
      background: radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 42%);
    }

    .final-message h1 {
      font-size: clamp(3rem, 8vw, 6.6rem);
      color: #fff8fb;
      letter-spacing: 6px;
      text-shadow:
        0 0 18px rgba(255,255,255,0.7),
        0 0 42px rgba(255,179,212,0.45),
        0 10px 28px rgba(0,0,0,0.22);
      animation: finalPulse 3s ease-in-out infinite;
    }

    @keyframes finalShow {
      0% {
        opacity: 0;
        transform: scale(0.92);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes finalPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    /* 音樂按鈕 */
    .music-btn {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 10;
      border: none;
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 15px;
      color: #9c5a78;
      background: rgba(255,255,255,0.88);
      box-shadow: 0 10px 25px rgba(0,0,0,0.14);
      backdrop-filter: blur(8px);
      cursor: pointer;
    }

    .music-btn:hover {
      transform: translateY(-2px);
    }

    .hint {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 10;
      color: rgba(255,255,255,0.82);
      font-size: 0.92rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.24);
    }

    @media (max-width: 768px) {
      .hint {
        display: none;
      }

      .music-btn {
        font-size: 14px;
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="sky"></div>

  <div class="stars" id="stars"></div>
  <div class="petals" id="petals"></div>

  <div class="scene">
    <div class="ground"></div>

    <div class="tree-stage">
      <svg viewBox="0 0 700 760" aria-label="growing tree animation">
        <!-- 光暈 -->
        <g class="glow">
          <ellipse cx="350" cy="250" rx="170" ry="140" fill="rgba(255,230,240,0.18)"></ellipse>
          <ellipse cx="350" cy="250" rx="230" ry="190" fill="rgba(255,240,210,0.10)"></ellipse>
        </g>

        <!-- 樹幹 -->
        <path class="trunk-path" d="M350 690 C345 620, 348 560, 350 500 C353 430, 347 360, 350 290 C352 235, 348 190, 350 145" />

        <!-- 分枝 -->
        <path class="branch-path b1" d="M349 420 C315 385, 285 355, 245 330" />
        <path class="branch-path b2" d="M351 380 C395 345, 430 315, 470 285" />
        <path class="branch-path b3" d="M350 300 C315 265, 290 235, 260 210" />
        <path class="branch-path b4" d="M351 250 C385 220, 415 190, 448 160" />

        <!-- 葉子 -->
        <ellipse class="leaf l1" cx="232" cy="325" rx="18" ry="28" fill="#8edc7d" transform="rotate(-32 232 325)" />
        <ellipse class="leaf l2" cx="250" cy="308" rx="16" ry="25" fill="#75c96b" transform="rotate(18 250 308)" />
        <ellipse class="leaf l3" cx="480" cy="278" rx="18" ry="28" fill="#92e284" transform="rotate(28 480 278)" />
        <ellipse class="leaf l4" cx="456" cy="298" rx="16" ry="25" fill="#6fc264" transform="rotate(-18 456 298)" />
        <ellipse class="leaf l5" cx="247" cy="205" rx="16" ry="26" fill="#8ddd7e" transform="rotate(-25 247 205)" />
        <ellipse class="leaf l6" cx="270" cy="188" rx="14" ry="22" fill="#71c567" transform="rotate(20 270 188)" />
        <ellipse class="leaf l7" cx="458" cy="157" rx="16" ry="26" fill="#8cde7d" transform="rotate(24 458 157)" />
        <ellipse class="leaf l8" cx="433" cy="176" rx="14" ry="22" fill="#74c96b" transform="rotate(-18 433 176)" />

        <!-- 花 -->
        <g class="flower f1" transform="translate(230 325)">
          <circle cx="0" cy="-10" r="9" fill="#ffd7e7"/>
          <circle cx="10" cy="0" r="9" fill="#ffbfd7"/>
          <circle cx="0" cy="10" r="9" fill="#ffd7e7"/>
          <circle cx="-10" cy="0" r="9" fill="#ffbfd7"/>
          <circle cx="0" cy="0" r="5.5" fill="#ffe59f"/>
        </g>

        <g class="flower f2" transform="translate(475 278)">
          <circle cx="0" cy="-10" r="9" fill="#ffd7e7"/>
          <circle cx="10" cy="0" r="9" fill="#ffbfd7"/>
          <circle cx="0" cy="10" r="9" fill="#ffd7e7"/>
          <circle cx="-10" cy="0" r="9" fill="#ffbfd7"/>
          <circle cx="0" cy="0" r="5.5" fill="#ffe59f"/>
        </g>

        <g class="flower f3" transform="translate(248 205)">
          <circle cx="0" cy="-9" r="8" fill="#ffdced"/>
          <circle cx="9" cy="0" r="8" fill="#ffcade"/>
          <circle cx="0" cy="9" r="8" fill="#ffdced"/>
          <circle cx="-9" cy="0" r="8" fill="#ffcade"/>
          <circle cx="0" cy="0" r="5" fill="#ffe59f"/>
        </g>

        <g class="flower f4" transform="translate(458 158)">
          <circle cx="0" cy="-9" r="8" fill="#ffdced"/>
          <circle cx="9" cy="0" r="8" fill="#ffcade"/>
          <circle cx="0" cy="9" r="8" fill="#ffdced"/>
          <circle cx="-9" cy="0" r="8" fill="#ffcade"/>
          <circle cx="0" cy="0" r="5" fill="#ffe59f"/>
        </g>

        <g class="flower f5" transform="translate(350 135)">
          <circle cx="0" cy="-11" r="10" fill="#ffd7e7"/>
          <circle cx="11" cy="0" r="10" fill="#ffc4da"/>
          <circle cx="0" cy="11" r="10" fill="#ffd7e7"/>
          <circle cx="-11" cy="0" r="10" fill="#ffc4da"/>
          <circle cx="0" cy="0" r="6" fill="#ffe59f"/>
        </g>
      </svg>
    </div>
  </div>

  <div class="captions">
    <div class="caption top-caption line1">三年的時間，悄悄地過去了</div>
    <div class="caption top-caption line2">有些課堂會結束，有些回憶卻不會</div>
    <div class="caption top-caption line3">而有些溫柔，會一直留在心裡</div>

    <div class="caption bottom-caption line4">
      老師，謝謝您陪我們走過迷惘、努力與成長。<br>
      您教會我們的，不只是知識，還有勇氣與溫暖。
    </div>

    <div class="caption bottom-caption line5">
      就像這棵慢慢長大的樹一樣，<br>
      我們也會帶著您的教誨，繼續向前、繼續發光。
    </div>
  </div>

  <div class="final-message">
    <h1>謝謝老師 ❤️</h1>
  </div>

  <button class="music-btn" id="musicBtn">♫ 播放音樂</button>
  <div class="hint">把音樂檔命名成 music.mp3 放進同一個資料夾</div>

  <audio id="bgm" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    // 星星
    const stars = document.getElementById("stars");
    for (let i = 0; i < 22; i++) {
      const s = document.createElement("div");
      s.className = "star";
      s.style.left = Math.random() * 100 + "vw";
      s.style.top = Math.random() * 55 + "vh";
      s.style.animationDelay = Math.random() * 3 + "s";
      s.style.animationDuration = (2.2 + Math.random() * 2.5) + "s";
      stars.appendChild(s);
    }

    // 花瓣
    const petals = document.getElementById("petals");
    for (let i = 0; i < 28; i++) {
      const p = document.createElement("div");
      p.className = "petal";
      p.style.left = Math.random() * 100 + "vw";
      p.style.animationDelay = Math.random() * 10 + "s";
      p.style.animationDuration = (7 + Math.random() * 7) + "s";
      p.style.transform = `scale(${0.7 + Math.random() * 0.9})`;
      petals.appendChild(p);
    }

    // 音樂控制
    const musicBtn = document.getElementById("musicBtn");
    const bgm = document.getElementById("bgm");

    musicBtn.addEventListener("click", async () => {
      if (bgm.paused) {
        try {
          await bgm.play();
          musicBtn.textContent = "♫ 暫停音樂";
        } catch (e) {
          alert("如果沒有播放成功，先點一下頁面，再按一次播放。");
        }
      } else {
        bgm.pause();
        musicBtn.textContent = "♫ 播放音樂";
      }
    });
  </script>
</body>
</html>
